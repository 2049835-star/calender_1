<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>업무 공유 및 일정 관리 시스템</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --container-bg: #ffffff;
            --text-color: #2d3748;
            --border-color: #e2e8f0;
            
            /* 항목(카테고리)별 전용 파스텔톤 색상 */
            --cat-tfs: #ffccd5;      /* 파스텔 핑크 */
            --cat-hht: #d8f3dc;      /* 파스텔 그린 */
            --cat-gemini: #e8dbfc;   /* 파스텔 퍼플 */
            --cat-service: #bde0fe;  /* 파스텔 블루 */
            
            --primary-color: #e2e8f0;
            --primary-hover: #cbd5e0;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1400px;
            background: var(--container-bg);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }

        header {
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 16px;
            margin-bottom: 24px;
        }

        header h1 {
            font-size: 22px;
            margin: 0;
            color: #4a5568;
            letter-spacing: -0.5px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 24px;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        /* 사이드바 영역 */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 18px;
        }

        .card h2 {
            font-size: 15px;
            margin-top: 0;
            margin-bottom: 14px;
            color: #4a5568;
            border-left: 4px solid #cbd5e0;
            padding-left: 8px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #718096;
        }

        .time-range-group {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 6px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 13px;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #cbd5e0;
            box-shadow: 0 0 0 3px rgba(203, 213, 224, 0.3);
        }

        /* 카테고리별 입력란 레이블 스타일 */
        .category-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #4a5568;
        }

        .btn-submit {
            width: 100%;
            padding: 11px;
            background-color: #cbd5e0;
            border: none;
            border-radius: 6px;
            color: #2d3748;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 6px;
        }

        .btn-submit:hover {
            background-color: #b2bfce;
        }

        /* 필터 스타일 */
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .filter-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            cursor: pointer;
            user-select: none;
        }

        .badge {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 4px;
        }

        /* 달력 영역 */
        .calendar-section {
            display: flex;
            flex-direction: column;
        }

        .calendar-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .calendar-nav button {
            background: #fff;
            border: 1px solid #cbd5e0;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }

        .calendar-nav button:hover {
            background: #f7fafc;
        }

        .current-month-year {
            font-size: 18px;
            font-weight: bold;
            color: #2d3748;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            border-top: 1px solid var(--border-color);
            border-left: 1px solid var(--border-color);
            background: #fff;
        }

        .calendar-header-cell {
            background: #f7fafc;
            text-align: center;
            padding: 10px 0;
            font-weight: 600;
            font-size: 13px;
            border-right: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            color: #4a5568;
        }

        .calendar-cell {
            min-height: 120px;
            border-right: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            padding: 6px;
            box-sizing: border-box;
            position: relative;
        }

        .calendar-cell.other-month {
            background: #fafafa;
        }

        .calendar-cell.other-month .day-number {
            color: #cbd5e0;
        }

        .day-number {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 6px;
            display: inline-block;
            width: 22px;
            height: 22px;
            line-height: 22px;
            text-align: center;
        }

        .calendar-cell.today .day-number {
            background: #4a5568;
            color: #fff;
            border-radius: 50%;
        }

        /* 일정 내부 박스 디자인 */
        .event-item {
            font-size: 11px;
            padding: 4px 6px;
            margin-bottom: 4px;
            border-radius: 4px;
            color: #2d3748;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 1px 2px rgba(0,0,0,0.03);
            border-left: 4px solid rgba(0,0,0,0.2);
        }

        .event-content {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            width: 88%;
        }

        .event-time-tag {
            font-weight: bold;
            color: #4a5568;
            margin-right: 2px;
        }

        .btn-delete {
            background: none;
            border: none;
            color: #a0aec0;
            font-size: 12px;
            cursor: pointer;
            padding: 0;
            display: none;
            line-height: 1;
        }

        .event-item:hover .btn-delete {
            display: inline-block;
            color: #e53e3e;
        }

        /* 카테고리 색상 클래스 정의 */
        .cat-tfs { background-color: var(--cat-tfs); }
        .cat-hht { background-color: var(--cat-hht); }
        .cat-gemini { background-color: var(--cat-gemini); }
        .cat-service { background-color: var(--cat-service); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>팀 업무 일정 관리 공유판</h1>
    </header>

    <div class="main-content">
        <div class="sidebar">
            <div class="card">
                <h2>신규 일정 등록</h2>
                <form id="scheduleForm">
                    <div class="form-group">
                        <label for="eventDate">날짜</label>
                        <input type="date" id="eventDate" required>
                    </div>
                    
                    <div class="form-group">
                        <label>시간 설정 (30분 단위)</label>
                        <div class="time-range-group">
                            <select id="startTime" required></select>
                            <span>~</span>
                            <select id="endTime" required></select>
                        </div>
                    </div>

                    <p style="font-size: 11px; color:#718096; margin-top:0; margin-bottom:12px;">* 텍스트를 입력한 카테고리만 달력에 등록됩니다.</p>

                    <div class="form-group">
                        <div class="category-label">
                            <span class="badge" style="background-color: var(--cat-tfs);"></span>
                            <label for="inputTfs">TFS</label>
                        </div>
                        <input type="text" id="inputTfs" placeholder="내용 입력 시에만 등록됨">
                    </div>
                    
                    <div class="form-group">
                        <div class="category-label">
                            <span class="badge" style="background-color: var(--cat-hht);"></span>
                            <label for="inputHht">HHT</label>
                        </div>
                        <input type="text" id="inputHht" placeholder="내용 입력 시에만 등록됨">
                    </div>
                    
                    <div class="form-group">
                        <div class="category-label">
                            <span class="badge" style="background-color: var(--cat-gemini);"></span>
                            <label for="inputGemini">Gemini</label>
                        </div>
                        <input type="text" id="inputGemini" placeholder="내용 입력 시에만 등록됨">
                    </div>
                    
                    <div class="form-group">
                        <div class="category-label">
                            <span class="badge" style="background-color: var(--cat-service);"></span>
                            <label for="inputService">서비스</label>
                        </div>
                        <input type="text" id="inputService" placeholder="내용 입력 시에만 등록됨">
                    </div>
                    
                    <button type="submit" class="btn-submit">일정 등록</button>
                </form>
            </div>

            <div class="card">
                <h2>카테고리 필터</h2>
                <div class="filter-group">
                    <label class="filter-item">
                        <input type="checkbox" id="filterAll" checked>
                        <span>전체 표시</span>
                    </label>
                    <hr style="border:0; border-top:1px solid var(--border-color); margin:4px 0; width:100%;">
                    <label class="filter-item">
                        <input type="checkbox" class="cat-filter" value="TFS" checked>
                        <span class="badge" style="background-color: var(--cat-tfs);"></span>
                        <span>TFS</span>
                    </label>
                    <label class="filter-item">
                        <input type="checkbox" class="cat-filter" value="HHT" checked>
                        <span class="badge" style="background-color: var(--cat-hht);"></span>
                        <span>HHT</span>
                    </label>
                    <label class="filter-item">
                        <input type="checkbox" class="cat-filter" value="Gemini" checked>
                        <span class="badge" style="background-color: var(--cat-gemini);"></span>
                        <span>Gemini</span>
                    </label>
                    <label class="filter-item">
                        <input type="checkbox" class="cat-filter" value="서비스" checked>
                        <span class="badge" style="background-color: var(--cat-service);"></span>
                        <span>서비스</span>
                    </label>
                </div>
            </div>
        </div>

        <div class="calendar-section">
            <div class="calendar-nav">
                <button id="btnPrev">&lt; 이전달</button>
                <div class="current-month-year" id="labelMonthYear">2026년 07월</div>
                <button id="btnNext">다음달 &gt;</button>
            </div>
            
            <div class="calendar-grid" id="calendarGrid">
                </div>
        </div>
    </div>
</div>

<script>
    // --- 1. 상태 데이터 정의 ---
    let calendarDate = new Date(); 
    let scheduleEvents = JSON.parse(localStorage.getItem('flexCategorySchedules')) || [];
    let enabledFilters = ['TFS', 'HHT', 'Gemini', '서비스'];

    const cssClassMap = {
        'TFS': 'cat-tfs',
        'HHT': 'cat-hht',
        'Gemini': 'cat-gemini',
        '서비스': 'cat-service'
    };

    // --- 2. DOM 요소 매핑 ---
    const calendarGrid = document.getElementById('calendarGrid');
    const labelMonthYear = document.getElementById('labelMonthYear');
    const btnPrev = document.getElementById('btnPrev');
    const btnNext = document.getElementById('btnNext');
    const scheduleForm = document.getElementById('scheduleForm');
    const filterAll = document.getElementById('filterAll');
    const catFilters = document.querySelectorAll('.cat-filter');
    const startTimeSelect = document.getElementById('startTime');
    const endTimeSelect = document.getElementById('endTime');

    // --- 3. 시간 선택기(30분 단위) 옵션 생성 ---
    function initTimeSelects() {
        startTimeSelect.innerHTML = '';
        endTimeSelect.innerHTML = '';
        
        for (let h = 0; h < 24; h++) {
            for (let m = 0; m < 60; m += 30) {
                const timeStr = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
                
                const optStart = document.createElement('option');
                optStart.value = timeStr;
                optStart.textContent = timeStr;
                startTimeSelect.appendChild(optStart);

                const optEnd = document.createElement('option');
                optEnd.value = timeStr;
                optEnd.textContent = timeStr;
                endTimeSelect.appendChild(optEnd);
            }
        }
        startTimeSelect.value = "09:00";
        endTimeSelect.value = "18:00";
    }

    document.getElementById('eventDate').value = new Date().toISOString().substring(0, 10);

    // --- 4. 핵심 캘린더 렌더링 로직 ---
    function render() {
        calendarGrid.innerHTML = '';
        
        const currentYear = calendarDate.getFullYear();
        const currentMonth = calendarDate.getMonth();

        labelMonthYear.textContent = `${currentYear}년 ${String(currentMonth + 1).padStart(2, '0')}월`;

        const weekDays = ['일', '월', '화', '수', '목', '금', '토'];
        weekDays.forEach(day => {
            const hCell = document.createElement('div');
            hCell.className = 'calendar-header-cell';
            hCell.textContent = day;
            calendarGrid.appendChild(hCell);
        });

        const firstDay = new Date(currentYear, currentMonth, 1);
        const lastDay = new Date(currentYear, currentMonth + 1, 0);
        
        const startDayIdx = firstDay.getDay();
        const prevMonthEnd = new Date(currentYear, currentMonth, 0).getDate();

        // Previous Month Days
        for (let i = startDayIdx - 1; i >= 0; i--) {
            const cell = document.createElement('div');
            cell.className = 'calendar-cell other-month';
            cell.innerHTML = `<span class="day-number">${prevMonthEnd - i}</span>`;
            calendarGrid.appendChild(cell);
        }

        // Current Month Days
        const realToday = new Date();
        for (let day = 1; day <= lastDay.getDate(); day++) {
            const cell = document.createElement('div');
            cell.className = 'calendar-cell';
            
            if (currentYear === realToday.getFullYear() && currentMonth === realToday.getMonth() && day === realToday.getDate()) {
                cell.classList.add('today');
            }

            cell.innerHTML = `<span class="day-number">${day}</span>`;

            const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            
            // 필터링 및 시간순 정렬 적용
            const matchedEvents = scheduleEvents
                .filter(ev => ev.date === dateStr && enabledFilters.includes(ev.category))
                .sort((a, b) => a.startTime.localeCompare(b.startTime));

            matchedEvents.forEach(ev => {
                const item = document.createElement('div');
                item.className = `event-item ${cssClassMap[ev.category] || ''}`;
                item.title = `[${ev.category}] 시간: ${ev.startTime}~${ev.endTime}\n내용: ${ev.content}`;
                
                item.innerHTML = `
                    <div class="event-content">
                        <span class="event-time-tag">[${ev.startTime}]</span>
                        <strong>${ev.category}:</strong> <span>${ev.content}</span>
                    </div>
                    <button class="btn-delete" data-id="${ev.id}">&times;</button>
                `;
                
                item.querySelector('.btn-delete').addEventListener('click', (e) => {
                    e.stopPropagation();
                    removeSchedule(ev.id);
                });

                cell.appendChild(item);
            });

            calendarGrid.appendChild(cell);
        }

        // Next Month Days
        const allocatedCells = startDayIdx + lastDay.getDate();
        const nextPadding = (7 - (allocatedCells % 7)) % 7;
        for (let day = 1; day <= nextPadding; day++) {
            const cell = document.createElement('div');
            cell.className = 'calendar-cell other-month';
            cell.innerHTML = `<span class="day-number">${day}</span>`;
            calendarGrid.appendChild(cell);
        }
    }

    // --- 5. 데이터 등록 및 조작 로직 (수정 핵심) ---
    scheduleForm.addEventListener('submit', (e) => {
        e.preventDefault();
        
        const start = startTimeSelect.value;
        const end = endTimeSelect.value;

        if (start > end) {
            alert('종료 시간은 시작 시간보다 빠를 수 없습니다.');
            return;
        }

        const date = document.getElementById('eventDate').value;
        
        // 4개 입력 필드의 엘리먼트와 카테고리 매핑 파싱
        const fields = [
            { category: 'TFS', el: document.getElementById('inputTfs') },
            { category: 'HHT', el: document.getElementById('inputHht') },
            { category: 'Gemini', el: document.getElementById('inputGemini') },
            { category: '서비스', el: document.getElementById('inputService') }
        ];

        let registeredCount = 0;

        // 텍스트가 채워진 필드만 순회하며 개별 등록 처리
        fields.forEach(field => {
            const value = field.el.value.trim();
            if (value !== '') {
                const data = {
                    id: `${Date.now()}-${Math.random().toString(36).substr(2, 5)}`, // 고유 ID 조합
                    date: date,
                    startTime: start,
                    endTime: end,
                    category: field.category,
                    content: value
                };
                scheduleEvents.push(data);
                registeredCount++;
                
                // 입력 필드 비우기
                field.el.value = '';
            }
        });

        if (registeredCount === 0) {
            alert('등록할 카테고리에 내용을 최소 한 개 이상 작성해 주세요.');
            return;
        }

        commitStorage();
    });

    function removeSchedule(id) {
        if(confirm('해당 일정을 삭제하시겠습니까?')) {
            scheduleEvents = scheduleEvents.filter(ev => ev.id !== id);
            commitStorage();
        }
    }

    function commitStorage() {
        localStorage.setItem('flexCategorySchedules', JSON.stringify(scheduleEvents));
        render();
    }

    // 네비게이션 버튼 액션
    btnPrev.addEventListener('click', () => {
        calendarDate.setMonth(calendarDate.getMonth() - 1);
        render();
    });

    btnNext.addEventListener('click', () => {
        calendarDate.setMonth(calendarDate.getMonth() + 1);
        render();
    });

    // --- 6. 필터 연동 시스템 ---
    function handleFilterChange() {
        enabledFilters = [];
        catFilters.forEach(chk => {
            if (chk.checked) enabledFilters.push(chk.value);
        });
        
        filterAll.checked = (enabledFilters.length === catFilters.length);
        render();
    }

    catFilters.forEach(chk => {
        chk.addEventListener('change', handleFilterChange);
    });

    filterAll.addEventListener('change', (e) => {
        const checkState = e.target.checked;
        catFilters.forEach(chk => chk.checked = checkState);
        handleFilterChange();
    });

    // 앱 최초 실행
    initTimeSelects();
    render();
</script>

</body>
</html>
